<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Power Monitoring System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Smart Power Monitoring System</h1>
    <p class="subtitle">EEE + Software Hybrid Project</p>

    <div class="cards">
      <div class="card">
        <h3>Voltage</h3>
        <p id="voltage">-- V</p>
      </div>

      <div class="card">
        <h3>Current</h3>
        <p id="current">-- A</p>
      </div>

      <div class="card">
        <h3>Power</h3>
        <p id="power">-- W</p>
      </div>

      <div class="card status-card">
        <h3>Status</h3>
        <p id="status">--</p>
      </div>
    </div>

    <div class="threshold-box">
      <h2>Update Power Threshold</h2>
      <input type="number" id="thresholdInput" placeholder="Enter threshold in watts" />
      <button onclick="updateThreshold()">Update Threshold</button>
      <p id="thresholdText">Current Threshold: -- W</p>
    </div>

    <div class="history-box">
      <h2>Last 10 Readings</h2>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Voltage</th>
            <th>Current</th>
            <th>Power</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
